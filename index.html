  <meta name="description" content="30 天 B2 西语词汇打卡、间隔复习与每日记录" />
  <style>
    :root{--ink:#14203b;--muted:#6d7690;--paper:#fbfaf7;--line:#e8e4db;--blue:#3157d5;--coral:#ff745d;--mint:#dff4ea}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 10% 0,#e8edff 0,transparent 34%),radial-gradient(circle at 100% 8%,#ffe9df 0,transparent 28%),var(--paper);font:15px/1.55 ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif}button{font:inherit}.shell{max-width:1120px;margin:auto;padding:24px 22px 60px}.top{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:38px}.brand{display:flex;align-items:center;gap:12px;font-weight:800}.mark{display:grid;place-items:center;width:42px;height:42px;border-radius:14px;background:var(--ink);color:#fff;font-size:15px;box-shadow:0 8px 20px #14203b30}.chip{padding:8px 13px;border:1px solid #dadeea;border-radius:999px;background:#ffffffb8;color:#52617c;font-size:13px}
    .hero{display:grid;grid-template-columns:1.12fr .88fr;gap:30px;align-items:center}.eyebrow{display:inline-flex;align-items:center;gap:9px;color:var(--blue);font-weight:800;letter-spacing:.13em;font-size:12px;text-transform:uppercase}.dot{width:7px;height:7px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 5px #ff745d20}h1{font-size:clamp(42px,6vw,76px);line-height:.98;letter-spacing:-.055em;margin:16px 0 20px}.accent{color:var(--blue);font-family:Georgia,"Noto Serif SC",serif;font-style:italic}.lead{font-size:18px;color:var(--muted);max-width:600px;margin:0 0 28px}.actions{display:flex;gap:12px;flex-wrap:wrap}.primary,.secondary{border:0;border-radius:14px;padding:13px 18px;cursor:pointer;font-weight:800}.primary{background:var(--blue);color:#fff;box-shadow:0 10px 25px #3157d535}.primary:hover{background:#2748bc}.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
    .orbit{position:relative;min-height:310px;display:grid;place-items:center}.big{width:270px;height:270px;border-radius:50%;background:linear-gradient(145deg,#3157d5,#839af0);box-shadow:0 22px 65px #263a7a25;display:grid;place-items:center;color:#fff;text-align:center;transform:rotate(3deg)}.big strong{font:800 78px/1 Georgia,serif}.big span{display:block;font-size:12px;letter-spacing:.16em;text-transform:uppercase;opacity:.8}.float{position:absolute;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 16px;box-shadow:0 12px 32px #2030601a;font-weight:800}.f1{top:30px;right:5px;transform:rotate(5deg)}.f2{bottom:20px;left:0;transform:rotate(-4deg)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:30px 0}.stat{background:#ffffffc4;border:1px solid var(--line);border-radius:17px;padding:17px}.stat b{display:block;font-size:26px;letter-spacing:-.04em}.stat small{color:var(--muted)}.workspace{display:grid;grid-template-columns:250px 1fr;gap:18px;align-items:start}.rail,.card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:0 10px 40px #2532540d}.rail{padding:18px;position:sticky;top:16px}.rail h3{font-size:14px;margin:0 0 14px}.days{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.day{aspect-ratio:1;border:0;border-radius:10px;background:#f2f3f7;color:#74809a;cursor:pointer}.day.active{background:var(--ink);color:#fff}.day.done{background:var(--mint);color:#217159}.tip{margin-top:15px;padding:13px;border-radius:14px;background:#f7f4ed;color:#6c6657;font-size:12px}
    .card{padding:clamp(22px,5vw,48px);min-height:440px;position:relative;overflow:hidden}.card:before{content:"";position:absolute;width:220px;height:220px;border-radius:50%;background:#edf0ff;right:-70px;top:-100px}.label{color:var(--blue);font-size:12px;font-weight:800;letter-spacing:.11em;text-transform:uppercase}.word{font:800 clamp(48px,8vw,82px)/1 Georgia,serif;letter-spacing:-.045em;margin:26px 0 10px}.kind{color:var(--muted);font-style:italic}.prompt{margin:28px 0;padding:18px;border-left:4px solid var(--coral);background:#fff7f4;border-radius:0 14px 14px 0}.answer{display:none;margin-top:20px;padding:20px;border-radius:16px;background:#f5f7ff}.answer.show{display:block}.meaning{font-size:24px;font-weight:800}.example{margin-top:8px;color:#56627a}.example em{color:var(--blue);font-style:normal;font-weight:700}.review{display:none;gap:9px;margin-top:18px;flex-wrap:wrap}.review.show{display:flex}.rate{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 13px;cursor:pointer}.rate:hover{border-color:var(--blue);color:var(--blue)}.notice{height:22px;margin-top:12px;color:#26805f;font-weight:800;font-size:13px}.foot{display:flex;justify-content:space-between;gap:16px;margin-top:26px;color:var(--muted);font-size:12px}.progress{height:8px;background:#eceef4;border-radius:999px;overflow:hidden;margin-top:10px}.bar{height:100%;background:linear-gradient(90deg,var(--blue),#839af0);width:0;transition:width .4s}
    @media(max-width:800px){.hero{grid-template-columns:1fr}.orbit{min-height:260px}.big{width:230px;height:230px}.workspace{grid-template-columns:1fr}.rail{position:static}.stats{grid-template-columns:repeat(2,1fr)}.top{margin-bottom:26px}.shell{padding-inline:15px}.days{grid-template-columns:repeat(10,1fr)}.day{font-size:11px}.foot{display:block}}
  </style>
</head>
<body><main class="shell">
  <header class="top"><div class="brand"><div class="mark">V30</div><span>Vocab 30 · Español</span></div><div class="chip">主动回忆 · 间隔复习</div></header>
  <section class="hero"><div><div class="eyebrow"><span class="dot"></span>30 day vocabulary sprint</div><h1>把西语单词<br><span class="accent">真正变成你的。</span></h1><p class="lead">每天一个 B2 高频词：先回忆，再揭晓，用 30 天建立可持续的主动词汇系统。</p><div class="actions"><button class="primary" id="start">开始今日训练</button><button class="secondary" id="reset">清空本机记录</button></div></div><div class="orbit"><div class="big"><div><strong id="heroDay">01</strong><span>今日训练日</span></div></div><div class="float f1">不看答案，先回忆</div><div class="float f2">1 · 3 · 7 · 14 天复习</div></div></section>
  <section class="stats"><div class="stat"><b id="completed">0</b><small>已完成天数</small></div><div class="stat"><b id="streak">0</b><small>连续打卡</small></div><div class="stat"><b id="mastered">0</b><small>掌握词汇</small></div><div class="stat"><b id="percent">0%</b><small>训练进度</small></div></section>
  <section class="workspace" id="training"><aside class="rail"><h3>30 天路线</h3><div class="days" id="days"></div><div class="tip">提示：先用自己的话说出词义或造句，再点击“揭晓答案”。</div></aside><article class="card"><div class="label" id="dayLabel"></div><div class="word" id="word"></div><div class="kind" id="kind"></div><div class="prompt" id="prompt"></div><button class="primary" id="reveal">揭晓答案</button><div class="answer" id="answer"><div class="meaning" id="meaning"></div><div class="example" id="example"></div></div><div class="review" id="review"><button class="rate" data-score="1">还不记得</button><button class="rate" data-score="2">有点模糊</button><button class="rate" data-score="3">已经掌握</button></div><div class="notice" id="notice"></div><div class="foot"><span>进度保存在当前浏览器，无需注册。</span><span id="countText">0 / 30</span></div><div class="progress"><div class="bar" id="bar"></div></div></article></section>
</main><script>
const vocab=[
["abarcar","动词","涵盖；包括","Este curso abarca temas muy diversos.","试着说出：这个项目涵盖三个阶段。"],["acertar","动词","猜中；做对","Por fin acerté la respuesta.","回忆一个你最近“猜对了”的场景。"],["ajeno/a","形容词","别人的；无关的","No debemos ser ajenos al problema.","用它表达“这件事与我无关”。"],["aplazar","动词","推迟","Tuvimos que aplazar la reunión.","说出一件你不得不推迟的事情。"],["aprovechar","动词","利用；把握","Hay que aprovechar esta oportunidad.","如何说“充分利用时间”？"],["asumir","动词","承担；假定","Ella asumió toda la responsabilidad.","用它描述承担责任。"],["carecer de","短语动词","缺乏","El informe carece de datos fiables.","想一个“缺乏证据”的表达。"],["coherente","形容词","连贯的；一致的","Su explicación es clara y coherente.","描述一个逻辑一致的观点。"],["conllevar","动词","意味着；伴随","El cambio conlleva ciertos riesgos.","说出“这个决定会带来后果”。"],["cuestionar","动词","质疑","Nadie cuestionó su versión.","你会质疑哪种常见观点？"],["destacar","动词","突出；强调","Quiero destacar dos aspectos.","用它开始强调两个重点。"],["desempeñar","动词","担任；发挥","Desempeña un papel fundamental.","如何说“发挥关键作用”？"],["eficaz","形容词","有效的","Buscamos una solución más eficaz.","描述一种有效的学习方法。"],["enfrentarse a","短语动词","面对","Nos enfrentamos a un gran reto.","说出你正在面对的挑战。"],["fomentar","动词","促进；鼓励","La lectura fomenta la creatividad.","什么能促进语言学习？"],["imprescindible","形容词","必不可少的","Dormir bien es imprescindible.","说出学语言必不可少的一件事。"],["llevar a cabo","动词短语","开展；执行","Llevaremos a cabo el plan mañana.","用它描述执行一项计划。"],["matizar","动词","细化；缓和说法","Quisiera matizar esa afirmación.","当你想修正观点时怎么说？"],["plantear","动词","提出；考虑","El artículo plantea una pregunta.","提出一个值得思考的问题。"],["prescindir de","短语动词","舍弃；不用","No podemos prescindir de su ayuda.","表达“我们不能没有互联网”。"],["prever","动词","预见；预计","Es difícil prever el resultado.","你如何说“预计会有变化”？"],["recalcar","动词","着重强调","El profesor recalcó la importancia de practicar.","着重强调练习的重要性。"],["respaldar","动词","支持；佐证","Los datos respaldan la teoría.","如何说“证据支持这个结论”？"],["sostenible","形容词","可持续的","Necesitamos un modelo sostenible.","描述一种可持续的生活方式。"],["suponer","动词","意味着；假设","Esto supone un gran avance.","用它表达“这意味着进步”。"],["tener en cuenta","动词短语","考虑到","Debemos tener en cuenta el contexto.","提醒别人考虑文化背景。"],["trascender","动词","超越；产生深远影响","Su obra trasciende las fronteras.","描述一种超越国界的影响。"],["vincular","动词","联系；关联","El estudio vincula sueño y memoria.","把两个概念联系起来。"],["viable","形容词","可行的","La propuesta parece viable.","评价一个方案是否可行。"],["poner de manifiesto","动词短语","表明；揭示","El informe pone de manifiesto la desigualdad.","用它说“数据揭示了问题”。"]];
const KEY="vocab30-recall-v2";let state;try{state=JSON.parse(localStorage.getItem(KEY)||'{"day":0,"scores":{}}')}catch{state={day:0,scores:{}}}let current=Math.max(0,Math.min(29,state.day||0));const $=id=>document.getElementById(id);function save(){localStorage.setItem(KEY,JSON.stringify(state))}function render(){const v=vocab[current];$("heroDay").textContent=String(current+1).padStart(2,"0");$("dayLabel").textContent="Day "+String(current+1).padStart(2,"0")+" · 主动回忆";$("word").textContent=v[0];$("kind").textContent=v[1];$("prompt").textContent=v[4];$("meaning").textContent=v[2];$("example").innerHTML="例句：<em>"+v[3]+"</em>";$("answer").classList.remove("show");$("review").classList.remove("show");$("notice").textContent="";$("reveal").style.display="inline-block";renderDays();stats()}function renderDays(){let h="";for(let i=0;i<30;i++){h+='<button class="day '+(i===current?'active':'')+' '+(state.scores[i]?'done':'')+'" data-day="'+i+'" aria-label="第 '+(i+1)+' 天">'+(i+1)+'</button>'}$("days").innerHTML=h;document.querySelectorAll(".day").forEach(b=>b.onclick=()=>{current=+b.dataset.day;state.day=current;save();render()})}function stats(){const vals=Object.values(state.scores),done=vals.length,mastered=vals.filter(x=>x===3).length;$("completed").textContent=done;$("mastered").textContent=mastered;$("streak").textContent=done;$("percent").textContent=Math.round(done/30*100)+"%";$("bar").style.width=done/30*100+"%";$("countText").textContent=done+" / 30"}$("reveal").onclick=()=>{$("answer").classList.add("show");$("review").classList.add("show");$("reveal").style.display="none"};document.querySelectorAll(".rate").forEach(b=>b.onclick=()=>{state.scores[current]=+b.dataset.score;state.day=Math.min(29,current+1);save();$("notice").textContent="已记录。明天会按节奏安排复习。";setTimeout(()=>{current=state.day;render()},650)});$("start").onclick=()=>$("training").scrollIntoView({behavior:"smooth"});$("reset").onclick=()=>{if(confirm("确定清空这台设备上的全部训练记录吗？")){state={day:0,scores:{}};current=0;save();render()}};render();
</script></body></html>
